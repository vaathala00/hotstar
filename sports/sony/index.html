<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SonyLiv Live Events</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<!-- LazySizes -->
<script src="https://cdn.jsdelivr.net/npm/lazysizes@5.3.2/lazysizes.min.js" async></script>

<style>
/* ===== THEME VARIABLES (From index.html) ===== */
:root {
    /* Dark Mode (Default) */
    --bg-color: #0f172a;
    --card-bg: rgba(30, 41, 59, 0.7);
    --card-border: rgba(148, 163, 184, 0.1);
    --accent-color: #38bdf8;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    
    /* Gradients */
    --gradient-start: #1e293b;
    --gradient-end: #0f172a;
    --bg-gradient: radial-gradient(circle at top left, #1e293b, #0f172a);

    /* Header */
    --header-bg: rgba(15, 23, 42, 0.8);
}

/* Light Mode Override */
body.light {
    --bg-color: #f8fafc;
    --card-bg: rgba(255, 255, 255, 0.9);
    --card-border: rgba(0, 0, 0, 0.05);
    --accent-color: #0284c7;
    --text-main: #0f172a;
    --text-muted: #64748b;
    
    --gradient-start: #f1f5f9;
    --gradient-end: #f8fafc;
    --bg-gradient: #f8fafc;
    
    --header-bg: rgba(255, 255, 255, 0.85);
}

body {
    margin: 0;
    background: var(--bg-gradient);
    color: var(--text-main);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    transition: background 0.4s ease, color 0.4s ease;
    -webkit-tap-highlight-color: transparent;
}

/* ===== HEADER ===== */
.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--header-bg);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--card-border);
  position: sticky;
  top: 0;
  z-index: 100;
}

/* Logo */
.logo-img {
  width: 46px;
  object-fit: contain;
  filter: brightness(0) invert(1);
}

body.light .logo-img {
  filter: none;
}

/* ===== SEARCH + THEME AREA ===== */
.controls {
  display: flex;
  align-items: center;
  gap: 0px; /* The standard gap between visible items */
  position: relative;
}

/* Search icon button */
#searchBtn {
  font-size: 18px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 8px;
}

/* Search box (hidden initially) */
.search-box {
  display: flex;
  align-items: center;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 0; /* FIX: No padding when collapsed */
  width: 0;
  opacity: 0;
  overflow: hidden;
  transition: width 0.35s ease, opacity 0.2s ease, padding 0.2s ease;
  backdrop-filter: blur(10px);
}

/* Active search */
.controls.active #searchBtn {
  display: none;
}

.controls.active .search-box {
  width: 200px;
  opacity: 1;
  padding: 4px 8px; /* FIX: Add padding only when active */
  border-color: var(--accent-color);
}

/* Search input */
.search-box input {
  border: none;
  outline: none;
  background: transparent;
  color: var(--text-main);
  font-size: 13px;
  width: 100%;
}

/* Close icon inside search box */
.search-box i {
  cursor: pointer;
  font-size: 14px;
  margin-left: 6px;
  color: var(--text-muted);
}

/* Theme icon */
.theme-icon {
  font-size: 18px;
  cursor: pointer;
  color: var(--text-muted);
  padding: 8px;
}

/* ===== CATEGORY ===== */
#categoryFilters {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 16px 12px 8px 12px;
}

.category-btn {
  padding: 6px 14px;
  font-size: 12px;
  border-radius: 20px;
  border: 1px solid var(--card-border);
  background: rgba(255,255,255,0.05);
  color: var(--text-muted);
  cursor: pointer;
  transition: 0.3s;
  font-weight: 500;
}

.category-btn.active,
.category-btn:hover {
  background: var(--accent-color);
  color: #0f172a;
  border-color: var(--accent-color);
  font-weight: 700;
}

/* ===== GRID ===== */
#listContainer {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 15px;
  padding: 15px;
  max-width: 1400px;
  margin: 0 auto;
}

/* ===== CARD (Style from your reference) ===== */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 18px;
  padding: 10px;
  height: 220px; /* Fixed height as requested */
  position: relative;
  transition: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: inherit;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-8px) scale(1.04);
  border-color: var(--accent-color);
  box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
}

.card img {
  width: 100%;
  height: 120px; /* Fixed height as requested */
  border-radius: 12px;
  object-fit: cover;
  background: rgba(0,0,0,0.2);
  margin-bottom: 8px;
  transition: transform 0.3s ease;
}

.card:hover img {
    transform: scale(1.03);
}

.card h2 {
  font-size: 13px;
  text-align: center;
  margin: 0 0 4px 0;
  font-weight: 600;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  width: 100%;
}

.card p {
  font-size: 11px;
  opacity: 0.7;
  text-align: center;
  margin: 0;
  font-weight: 500;
  color: var(--text-muted);
}

/* ===== LIVE BADGE (Simple Style) ===== */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 4px 8px;
  font-size: 10px;
  font-weight: 700;
  border-radius: 20px;
  text-transform: uppercase;
  z-index: 2;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.live-badge {
  background: #ef4444;
  color: white;
  animation: pulse 1.2s infinite;
}

.upcoming-badge {
  background: var(--accent-color);
  color: #0f172a;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
  70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
  100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}

/* Responsive */
@media (max-width: 600px) {
    .app-header { padding: 10px 12px; }
    #listContainer { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 12px; }
    .card { height: 200px; padding: 8px; }
    .card img { height: 100px; border-radius: 10px; }
}
</style>
</head>
<body>

<header class="app-header">
  <img src="https://images.slivcdn.com/UI_icons/sonyliv_new_revised_header_logo.png?w=40&q=high" class="logo-img">

  <!-- RIGHT CONTROLS: Search + Theme -->
  <div class="controls" id="controls">
    <i id="searchBtn" class="fa-solid fa-magnifying-glass"></i>

    <div class="search-box">
      <input type="search" id="searchInput" placeholder="Search events...">
      <i id="closeBtn" class="fa-solid fa-xmark"></i>
    </div>

    <i id="themeToggle" class="fa-solid fa-moon theme-icon"></i>
  </div>
</header>

<div id="categoryFilters"></div>
<div id="listContainer"></div>

<script>
let allMatches = [];
let selectedCategory = 'All';

/* ===== SEARCH TOGGLE ===== */
const controls = document.getElementById('controls');
const searchBtn = document.getElementById('searchBtn');
const closeBtn = document.getElementById('closeBtn');
const searchInput = document.getElementById('searchInput');

searchBtn.onclick = () => {
  controls.classList.add('active');
  searchInput.focus();
};

closeBtn.onclick = () => {
  controls.classList.remove('active');
  searchInput.value = '';
  applyFilters();
};

/* ===== THEME TOGGLE ===== */
const themeToggle = document.getElementById('themeToggle');

function setTheme(theme) {
  document.body.className = theme;
  themeToggle.className =
    theme === 'light'
      ? 'fa-solid fa-moon theme-icon'
      : 'fa-solid fa-sun theme-icon';
  localStorage.setItem('theme', theme);
}

themeToggle.onclick = () => {
  setTheme(document.body.classList.contains('light') ? '' : 'light');
};

setTheme(localStorage.getItem('theme') || '');

/* ===== DATA & RENDERING ===== */
async function loadData() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/drmlive/sliv-live-events/main/sonyliv.json');
    const data = await res.json();
    allMatches = data.matches || [];
    createCategories();
    applyFilters();
  } catch (error) {
    console.error("Error loading data:", error);
    document.getElementById('listContainer').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--text-muted)">Failed to load events.</div>';
  }
}

function createCategories() {
  const box = document.getElementById('categoryFilters');
  box.innerHTML = '';
  ['All', ...new Set(allMatches.map(i => i.event_category).filter(Boolean))]
    .forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'category-btn' + (cat === 'All' ? ' active' : '');
      btn.textContent = cat;
      btn.onclick = () => {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCategory = cat;
        applyFilters();
      };
      box.appendChild(btn);
    });
}

function applyFilters() {
  const val = searchInput.value.toLowerCase();
  renderCards(
    allMatches.filter(i =>
      (selectedCategory === 'All' || i.event_category === selectedCategory) &&
      (i.event_name || '').toLowerCase().includes(val)
    )
  );
}

function renderCards(data) {
  const box = document.getElementById('listContainer');
  box.innerHTML = '';

  data.forEach(i => {
    // Create anchor element for clickable card
    const anchor = document.createElement('a');
    anchor.href = `eplay.html?id=${i.contentId || ''}`;
    anchor.style.textDecoration = 'none';
    anchor.style.color = 'inherit';

    // Create card container
    const card = document.createElement('div');
    card.className = 'card';

    // Live or Upcoming Badge (Simple pill style)
    if (i.isLive) {
        card.innerHTML += '<div class="badge live-badge">LIVE</div>';
    } else {
        card.innerHTML += '<div class="badge upcoming-badge">UPCOMING</div>';
    }

    // Image
    card.innerHTML += `
      <img data-src="${i.src}" class="lazyload" alt="${i.event_name}">
      <h2>${i.event_name || ''}</h2>
      <p>${i.event_category || ''}</p>
    `;

    anchor.appendChild(card);
    box.appendChild(anchor);
  });
}

/* ===== SEARCH FILTER ===== */
searchInput.addEventListener('input', applyFilters);

loadData();
</script>

</body>
</html>
