<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Player</title>
    <!-- Load hls.js library from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* Basic reset to ensure no extra spacing */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black; /* Match the player background */
        }
        /* Make the video fill the container */
        video {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <!-- This is the video element you wanted -->
    <video id="video" controls muted></video>

    <script>
        var video = document.getElementById('video');
        
        // This is the raw stream URL extracted from your link
        var streamUrl = 'https://sonydaimenew.akamaized.net/hls/live/2018457/DAI35-criclive/std_lrh-800300010.m3u8?hdnea=exp=1774019175~acl=/*~id=91990382505698220415188248154023~hmac=4820998aab8ab44ab8f1a98f7c430345ac0d376a07bc527e6e719e0d5bfdec5e';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play().catch(e => console.log("Auto-play prevented by browser policy"));
            });
        }
        // For native HLS support (Safari/iOS)
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>

</body>
</html>
