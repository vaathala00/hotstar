
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Video Player</title>
    <!-- Google Cast SDK -->
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <!-- HLS.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .player-wrapper {
            width: 100%;
            max-width: 900px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            position: relative;
        }
        
        /* Video Container */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Overlay for input when no URL is provided */
        .url-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        .url-overlay.hidden {
            display: none;
        }

        .url-input {
            width: 80%;
            max-width: 500px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }

        .url-input:focus {
            border-color: #00cc33;
        }

        .play-btn {
            background: #00cc33;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .play-btn:hover {
            background: #00ff44;
        }

        /* Controls */
        .player-controls {
            background: #1a1a1a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            border-top: 1px solid #333;
        }

        .cast-button {
            background: #00cc33;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        .cast-button:hover {
            background: #00ff44;
            transform: translateY(-2px);
        }
        .cast-button svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        #castStatus {
            color: #aaa;
            font-size: 14px;
        }
        
        /* Error Message Toast */
        .toast {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #dc3545;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 20;
            max-width: 90%;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="player-wrapper">
        <!-- Error Toast -->
        <div id="errorToast" class="toast"></div>

        <!-- Input Overlay (Shown if no URL is in query params) -->
        <div id="urlOverlay" class="url-overlay ${streamParam ? 'hidden' : ''}">
            <h2 style="margin-bottom: 20px;">Enter Stream URL</h2>
            <input type="text" id="manualUrl" class="url-input" placeholder="https://example.com/stream.m3u8" value="${streamParam}">
            <button class="play-btn" onclick="loadManualUrl()">Load Stream</button>
        </div>

        <div class="video-container">
            <video id="hlsPlayer" controls playsinline></video>
        </div>
        
        <div class="player-controls">
            <button class="cast-button" id="castButton" onclick="castVideo()">
                <svg viewBox="0 0 24 24"><path d="M1,18 L1,21 L4,21 C4,19.34 2.66,18 1,18 M1,14 L1,16 C3.76,16 6,18.24 6,21 L8,21 C8,17.13 4.87,14 1,14 M1,10 L1,12 C5.97,12 10,16.03 10,21 L12,21 C12,14.92 7.07,10 1,10 M21,3 L3,3 C1.9,3 1,3.9 1,5 L1,8 L3,8 L3,5 L21,5 L21,19 L14,19 L14,21 L21,21 C22.1,21 23,20.1 23,19 L23,5 C23,3.9 22.1,3 21,3 Z"/></svg>
                Cast to TV
            </button>
            <span id="castStatus"></span>
        </div>
    </div>

    <script>
        // Inject the URL from Worker parameter
        const initialUrl = "${streamParam}";
        const video = document.getElementById('hlsPlayer');
        let hls = null;
        let currentStreamUrl = '';

        function showToast(message) {
            const toast = document.getElementById('errorToast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function initPlayer(streamUrl) {
            if (!streamUrl) return;
            
            currentStreamUrl = streamUrl;
            // Clean up previous instance if exists
            if (hls) {
                hls.destroy();
            }

            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native HLS support (Safari/iOS)
                video.src = streamUrl;
            } else if (Hls.isSupported()) {
                // Use HLS.js for other browsers
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true
                });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    console.log('HLS stream loaded successfully');
                    video.play().catch(e => console.log('Autoplay blocked:', e));
                });
                
                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        console.error('HLS Error:', data);
                        showToast('Stream Error: ' + (data.details || 'Unknown error'));
                    }
                });
            } else {
                showToast('HLS is not supported in this browser.');
            }
        }

        function loadManualUrl() {
            const input = document.getElementById('manualUrl');
            const url = input.value.trim();
            if (url) {
                document.getElementById('urlOverlay').classList.add('hidden');
                initPlayer(url);
            } else {
                showToast('Please enter a valid URL');
            }
        }

        // Initialize if URL was provided in query params
        if (initialUrl) {
            initPlayer(initialUrl);
        }
        
        // Chromecast functionality
        let castSession = null;
        
        function initChromecast() {
            if (typeof cast !== 'undefined') {
                cast.framework.CastContext.getInstance().setOptions({
                    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
                });
                
                const castContext = cast.framework.CastContext.getInstance();
                castContext.addEventListener(
                    cast.framework.CastContextEventType.CAST_STATE_CHANGED,
                    onCastStateChanged
                );
            }
        }
        
        function castVideo() {
            // If we haven't loaded a stream yet, try to use the input value
            const urlToCast = currentStreamUrl || document.getElementById('manualUrl').value;
            
            if(!urlToCast) {
                showToast('No stream loaded to cast');
                return;
            }

            const castContext = cast.framework.CastContext.getInstance();
            const castSession = castContext.getCurrentSession();
            
            if (castSession) {
                const mediaInfo = new chrome.cast.media.MediaInfo(urlToCast, 'application/x-mpegurl');
                mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
                mediaInfo.metadata.title = 'Live Stream';
                
                const request = new chrome.cast.media.LoadRequest(mediaInfo);
                castSession.loadMedia(request).then(
                    () => {
                        document.getElementById('castStatus').textContent = 'Casting...';
                        console.log('Casting started');
                    },
                    (error) => {
                        console.error('Error casting:', error);
                        document.getElementById('castStatus').textContent = 'Cast failed';
                    }
                );
            } else {
                castContext.requestSession().then(
                    () => { castVideo(); },
                    (error) => {
                        console.error('Error starting cast session:', error);
                        showToast('Chromecast Connection Failed. Ensure same network.');
                    }
                );
            }
        }
        
        function onCastStateChanged(event) {
            const status = document.getElementById('castStatus');
            switch(event.castState) {
                case cast.framework.CastState.CONNECTED:
                    status.textContent = 'Connected to Chromecast';
                    status.style.color = '#00cc33';
                    break;
                case cast.framework.CastState.NOT_CONNECTED:
                    status.textContent = '';
                    status.style.color = '#aaa';
                    break;
            }
        }
        
        // Initialize Chromecast when SDK is loaded
        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                initChromecast();
            }
        };
    </script>
</body>
</html>
