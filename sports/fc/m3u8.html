<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HLS Tester Embed</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="hls-frame" src="" allow="autoplay; fullscreen; encrypted-media; picture-in-picture" allowfullscreen referrerpolicy="no-referrer"></iframe>

  <script>
    // Get the 'url' parameter from the current page
    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get('url');

    // If url exists, load it in the iframe
    if (videoUrl) {
      const iframe = document.getElementById('hls-frame');
      // You can switch this between your HLS Tester or local index.html
      iframe.src = `https://hiredhosting.com/HLS-Tester/?url=${encodeURIComponent(videoUrl)}`;
      // For local version, use:
      // iframe.src = `index.html?url=${encodeURIComponent(videoUrl)}`;
    } else {
      document.body.innerHTML = "<p style='text-align:center; margin-top:20px;'>No URL provided. Add ?url=YOUR_VIDEO_URL to the address bar.</p>";
    }
  </script>
</body>
</html>
