<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HLS Video Player</title>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
}
.player-container {
    width: 100%;
    max-width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
video {
    width: 100%;
    display: block;
    background: #000;
}
.player-controls {
    background: #1a1a1a;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
}
.cast-button {
    background: #00cc33;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
}
.cast-button:hover { background: #00ff44; transform: translateY(-2px); }
.cast-button svg { width: 20px; height: 20px; fill: currentColor; }
#castStatus { color: #fff; font-size: 14px; }
</style>
</head>
<body>
<div class="player-container">
    <video id="hlsPlayer" controls playsinline></video>
    <div class="player-controls">
        <button class="cast-button" id="castButton" onclick="castVideo()">
            <svg viewBox="0 0 24 24"><path d="M1,18 L1,21 L4,21 C4,19.34 2.66,18 1,18 M1,14 L1,16 C3.76,16 6,18.24 6,21 L8,21 C8,17.13 4.87,14 1,14 M1,10 L1,12 C5.97,12 10,16.03 10,21 L12,21 C12,14.92 7.07,10 1,10 M21,3 L3,3 C1.9,3 1,3.9 1,5 L1,8 L3,8 L3,5 L21,5 L21,19 L14,19 L14,21 L21,21 C22.1,21 23,20.1 23,19 L23,5 C23,3.9 22.1,3 21,3 Z"/></svg>
            Cast to TV
        </button>
        <span id="castStatus"></span>
    </div>
</div>

<script>
const video = document.getElementById('hlsPlayer');

// Get ?url= parameter
const params = new URLSearchParams(window.location.search);
const streamUrl = params.get('url');

if (!streamUrl) {
    alert('No video URL provided. Use ?url=YOUR_M3U8');
} else {
    // Initialize HLS
    if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = streamUrl;
    } else if (Hls.isSupported()) {
        const hls = new Hls({ enableWorker: true, lowLatencyMode: true });
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); });
        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) { alert('Error loading video stream.'); }
        });
    } else {
        alert('HLS not supported in this browser.');
    }
}

// Chromecast setup
function initChromecast() {
    if (typeof cast !== 'undefined') {
        const castContext = cast.framework.CastContext.getInstance();
        castContext.setOptions({
            receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
            autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
        });
        castContext.addEventListener(cast.framework.CastContextEventType.CAST_STATE_CHANGED, onCastStateChanged);
    }
}

function castVideo() {
    const castContext = cast.framework.CastContext.getInstance();
    const session = castContext.getCurrentSession();
    if (session) {
        const mediaInfo = new chrome.cast.media.MediaInfo(streamUrl, 'application/x-mpegurl');
        mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
        mediaInfo.metadata.title = 'Live Stream';
        session.loadMedia(new chrome.cast.media.LoadRequest(mediaInfo)).then(
            () => { document.getElementById('castStatus').textContent = 'Casting...'; },
            (err) => { document.getElementById('castStatus').textContent = 'Cast failed'; console.error(err); }
        );
    } else {
        castContext.requestSession().then(() => { castVideo(); }, (err) => console.error(err));
    }
}

function onCastStateChanged(event) {
    const status = document.getElementById('castStatus');
    status.textContent = event.castState === cast.framework.CastState.CONNECTED ? 'Connected to Chromecast' : '';
}

// Init Chromecast when SDK is ready
window['__onGCastApiAvailable'] = function(isAvailable) {
    if (isAvailable) initChromecast();
};
</script>
</body>
</html>
