<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Match</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1c1f26;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --primary: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #3b82f6, #2563eb);
            --accent: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 125vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Main Layout --- */
        main {
            width: 100%;
            max-width: 1000px;
            padding: 16px;
            padding-bottom: 100px; /* Space for floating buttons */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Video Player Section --- */
        .player-section {
            position: relative;
            width: 100%;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: #000;
            box-shadow: var(--shadow);
            aspect-ratio: 16/9; /* Responsive Video Ratio */
        }

        .player-section iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Floating Live Counter */
        #live-counter {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 50px;
            font-size: 12px;
            color: #fff;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #live-counter i {
            color: var(--danger);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* --- Match Info Card --- */
        .match-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .match-thumb {
            width: 80px;
            height: 80px;
            border-radius: var(--radius-md);
            object-fit: cover;
            background: #2a2d36;
            flex-shrink: 0;
        }

        .match-details {
            flex: 1;
            overflow: hidden;
        }

        .match-title {
            margin: 0 0 6px 0;
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .match-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .badge-live {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- Action Buttons Grid --- */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            cursor: pointer;
            user-select: none;
            text-align: center;
            border: none;
        }

        .btn i { font-size: 1.1rem; }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:active { transform: scale(0.98); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.12); }

        .btn-accent {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #000;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25);
        }

        /* --- Floating Telegram --- */
        .telegram-fab {
            position: fixed;
            bottom: 55px;
            left: 20px;
            width: 56px;
            height: 56px;
            background: #229ED9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(34, 158, 217, 0.4);
            z-index: 1000;
            transition: transform 0.2s;
            text-decoration: none;
        }
        .telegram-fab:hover { transform: scale(1.1); }
        .telegram-fab img { width: 32px; height: 32px; }

        /* --- Floating Chat --- */
        .chat-fab {
            position: fixed;
            bottom: 55px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            z-index: 1001;
            cursor: move;
            color: white;
            font-size: 24px;
            user-select: none;
            touch-action: none;
        }
        .chat-fab:active { transform: scale(0.95); }

        .chat-window {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: #fff;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            flex-direction: column;
            animation: slideUp 0.3s ease-out;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .chat-header {
            background: #f1f1f1;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }
        .chat-header h4 { margin: 0; font-size: 14px; color: #333; }
        .close-chat {
            background: none; border: none; font-size: 20px; color: #666; cursor: pointer; padding: 5px;
        }
        .chat-window iframe { width: 100%; height: 100%; border: none; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Toast Notification --- */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--card-bg);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        #toast i { color: var(--success); }

        /* --- Responsive Tweaks --- */
        @media (min-width: 768px) {
            main { padding: 40px 20px; }
            .actions-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 480px) {
            .match-card { padding: 12px; }
            .match-thumb { width: 60px; height: 60px; }
            .match-title { font-size: 1rem; }
            .chat-window { width: 95%; height: 60vh; left: 2.5%; right: auto; bottom: 80px; }
            .telegram-fab, .chat-fab { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>

<!-- Toast Notification -->
<div id="toast"><i class="fas fa-check-circle"></i> <span>Link copied successfully!</span></div>

<main>
    <!-- Player Section -->
    <div class="player-section">
        <iframe id="videoIframe" src="" allowfullscreen></iframe>
        <div id="live-counter">
            <i class="fas fa-eye"></i>
            <span id="counter-container"></span>
        </div>
    </div>

    <!-- Match Info -->
    <div class="match-card" id="matchInfo"></div>

    <!-- Buttons -->
    <div class="actions-grid">
        <a href="" id="playNowButton1" class="btn btn-primary">
            <i class="fas fa-play"></i> Play Now
        </a>
        <a href="" id="playNowButton2" class="btn btn-secondary"
           data-package="com.genuine.leone"
           data-title="VT">
            <i class="fas fa-tv"></i> NS Player
        </a>
        <a href="" id="rubbyButton" class="btn btn-secondary"
           data-package="com.rubby.leone"
           data-title="VT">
            <i class="fas fa-desktop"></i> Ruby Pc
        </a>
        <button id="copyLinkButton" class="btn btn-accent">
            <i class="fas fa-copy"></i> Copy Link
        </button>
    </div>
</main>

<!-- Telegram -->
<a class="telegram-fab" href="https://t.me/vaathala1" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" alt="Telegram">
</a>

<!-- Chat Toggle Button (Draggable) -->
<div class="chat-fab" id="chatToggle">
    <i class="fas fa-comment-dots"></i>
</div>

<!-- Chat Window -->
<div class="chat-window" id="chatBox">
    <div class="chat-header">
        <h4>Live Chat</h4>
        <button class="close-chat" id="chatClose">&times;</button>
    </div>
    <iframe src="https://www.youtube.com/live_chat?v=9M02G5c6x6w&embed_domain=vaathala00.github.io" allow="microphone; camera"></iframe>
</div>

<script>

// Helper: Show Toast
function showToast(message) {
    const toast = document.getElementById('toast');
    toast.querySelector('span').innerText = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// --- Main Logic ---
const matchId = parseInt(new URLSearchParams(window.location.search).get('id'));
const jsonUrl = 'https://fanco.vodep39240327.workers.dev/';

fetch(jsonUrl)
.then(res => res.json())
.then(data => {

    let match = null;

    if (Array.isArray(data.matches)) {
        match = data.matches.find(m => m.match_id === matchId);
    } else if (data.match_id === matchId) {
        match = data;
    }

    if (!match) {
        // Updated error UI
        document.getElementById('matchInfo').innerHTML = `
            <div style="text-align:center; padding: 20px; color: var(--danger);">
                <i class="fas fa-exclamation-triangle fa-2x"></i>
                <p>Match not found!</p>
            </div>
        `;
        return;
    }

    // Updated HTML generation for match info to match new CSS
    document.getElementById('matchInfo').innerHTML = `
        <img src="${match.src}" class="match-thumb" alt="Match Thumb">
        <div class="match-details">
            <h2 class="match-title">${match.match_name}</h2>
            <div class="match-meta">
                <span class="badge-live"><i class="fas fa-circle" style="font-size:6px; vertical-align:middle; margin-right:4px;"></i> ${match.status}</span>
            </div>
        </div>
    `;

    // Load iframe with specific URL from your code
    document.getElementById('videoIframe').src =
        "https://allinonereborn.online/fanc/player_india.html?id=" +
        encodeURIComponent(match.match_id);

    const videoLink = match.adfree_url || "";

    // Direct play
    document.getElementById('playNowButton1').href = videoLink;

    // Extra headers
    const extraParams =
        '?|Origin=https://allinonereborn.online/fcww&Referer=https://allinonereborn.online/fcww';

    const finalVideoLink = videoLink + extraParams;

    /* =========================
       Ruby PC Intent
    ========================= */
    const rubyBtn = document.getElementById('rubbyButton');
    rubyBtn.href =
        'intent:' + finalVideoLink +
        '#Intent;package=' + rubyBtn.dataset.package +
        ';S.title=' + rubyBtn.dataset.title +
        ';end';

    /* =========================
       NS Player Intent
    ========================= */
    const nsBtn = document.getElementById('playNowButton2');
    nsBtn.href =
        'intent:' + finalVideoLink +
        '#Intent;package=' + nsBtn.dataset.package +
        ';S.title=' + nsBtn.dataset.title +
        ';end';

    // Copy Logic (Updated to use Toast)
    document.getElementById('copyLinkButton').addEventListener('click', e => {
        e.preventDefault();
        if (videoLink) {
            navigator.clipboard.writeText(videoLink)
                .then(() => showToast('Link copied!'));
        }
    });

})
.catch(err => {
    document.getElementById('matchInfo').innerHTML = `
        <div style="text-align:center; padding: 20px; color: var(--danger);">
            <p>Error loading match info!</p>
        </div>
    `;
});

// Live Counter
function loadCounter(){
    const container = document.getElementById("counter-container");
    container.innerHTML = "";
    const script = document.createElement("script");
    script.src = "//widget.supercounters.com/ssl/online_t.js";
    container.appendChild(script);
    const init = document.createElement("script");
    init.innerHTML = 'sc_online_t(1703136,"","ffffff");';
    container.appendChild(init);
}
loadCounter();
setInterval(loadCounter, 20000);

// Chat Toggle
const chatToggle = document.getElementById('chatToggle');
const chatBox = document.getElementById('chatBox');
const chatClose = document.getElementById('chatClose');

function toggleChat() {
    const isHidden = getComputedStyle(chatBox).display === 'none';
    chatBox.style.display = isHidden ? 'flex' : 'none';
    chatToggle.classList.toggle('open', isHidden);
}

chatToggle.addEventListener('click', (e) => {
    if (isDragging) return; 
    toggleChat();
});

chatClose.addEventListener('click', toggleChat);

// Draggable chat toggle (Mouse + Touch Support)
let isDragging = false, startX, startY, initialLeft, initialTop;

function dragStart(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const rect = chatToggle.getBoundingClientRect();
    
    startX = clientX;
    startY = clientY;
    initialLeft = rect.left;
    initialTop = rect.top;
    isDragging = false;

    document.addEventListener('mousemove', dragMove);
    document.addEventListener('touchmove', dragMove, { passive: false });
    document.addEventListener('mouseup', dragEnd);
    document.addEventListener('touchend', dragEnd);
}

function dragMove(e) {
    isDragging = true;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const dx = clientX - startX;
    const dy = clientY - startY;

    chatToggle.style.left = `${initialLeft + dx}px`;
    chatToggle.style.top = `${initialTop + dy}px`;
    chatToggle.style.bottom = 'auto';
    chatToggle.style.right = 'auto';
    
    if(e.cancelable) e.preventDefault();
}

function dragEnd() {
    document.removeEventListener('mousemove', dragMove);
    document.removeEventListener('touchmove', dragMove);
    document.removeEventListener('mouseup', dragEnd);
    document.removeEventListener('touchend', dragEnd);
}

chatToggle.addEventListener('mousedown', dragStart);
chatToggle.addEventListener('touchstart', dragStart, { passive: false });

</script>
</body>
</html>
