<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Hub - Live Streaming</title>
  <!-- Icons -->
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css">
  <link rel="shortcut icon" href="https://t4.ftcdn.net/jpg/03/02/12/83/360_F_302128359_q6aCwgAvdYZBPF4XSwxXddLPE0h3Kor1.jpg">
  
  <style>
    /* ===== CSS Variables & Reset ===== */
    :root {
      --primary-color: #3b82f6; /* Modern Blue */
      --accent-color: #00E0FF; /* Cyan for highlights */
      --bg-color: #0f1014; /* Deep dark background */
      --surface-color: #1e2029; /* Card background */
      --text-main: #ffffff;
      --text-secondary: #a0a0a0;
      --nav-bg: rgba(15, 16, 20, 0.85);
      --card-radius: 16px;
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    body.light {
      --bg-color: #f3f4f6;
      --surface-color: #ffffff;
      --text-main: #1f2937;
      --text-secondary: #6b7280;
      --nav-bg: rgba(255, 255, 255, 0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      overflow-x: hidden;
      scroll-behavior: smooth;
      transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* ===== Scrollbar Styling ===== */
    ::-webkit-scrollbar { width: 8px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-color); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

    /* ===== Navigation (Glassmorphism) ===== */
    nav {
      position: fixed; top: 0; left: 0; width: 100%; height: 70px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 30px; z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.3s;
    }
    body.light nav { border-bottom: 1px solid rgba(0,0,0,0.05); }

    nav .logo a {
      color: var(--primary-color); 
      font-size: 28px; 
      text-decoration: none; 
      font-weight: 800; 
      letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    nav .logo a span { color: var(--text-main); }

    .nav-actions { display: flex; align-items: center; gap: 20px; }

    /* Search Bar */
    .search-container {
      position: relative; display: flex; align-items: center;
      background: rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 5px;
      transition: var(--transition);
    }
    body.light .search-container { background: rgba(0,0,0,0.05); }

    .search-container input {
      width: 0;
      opacity: 0;
      background: transparent;
      border: none;
      color: var(--text-main);
      padding: 8px 12px;
      font-size: 15px;
      outline: none;
      transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
    }
    .search-container.active input { width: 220px; opacity: 1; }

    .search-container .search-icon {
      font-size: 20px;
      color: var(--text-main);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .search-container .search-icon:hover { background: rgba(255,255,255,0.1); }

    /* Dark/Light Toggle */
    .dark-light { 
      cursor: pointer; font-size: 24px; 
      color: var(--text-main);
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      border-radius: 50%;
      transition: var(--transition);
    }
    .dark-light:hover { background: rgba(255,255,255,0.1); transform: rotate(15deg); }

    /* ===== Scroll To Top ===== */
    .up {
      position: fixed; bottom: 30px; right: 30px; 
      font-size: 20px;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
      color: white; 
      width: 50px; height: 50px;
      border-radius: 50%;
      cursor: pointer; 
      display: none; 
      z-index: 999;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      justify-content: center; align-items: center;
      transition: var(--transition);
    }
    .up:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4); }

    /* ===== Main Content Layout ===== */
    main { padding-top: 90px; padding-bottom: 50px; }

    /* ===== Hero / Iframe Section ===== */
    .hero-section {
      width: 95%;
      max-width: 1000px;
      margin: 0 auto 40px auto;
      background: var(--surface-color);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.05);
      animation: fadeInDown 0.8s ease-out;
    }
    .hero-header {
      padding: 15px 25px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; justify-content: space-between; align-items: center;
    }
    .hero-header h3 { font-size: 16px; color: var(--accent-color); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    
    iframe { 
      width: 100%; 
      height: 260px; 
      border: none; 
      display: block; 
      background: #000;
    }

    /* ===== Section Titles ===== */
    .section-header {
      padding: 0 5%; 
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
      opacity: 0; /* For scroll animation */
      transform: translateY(20px);
      transition: var(--transition);
    }
    .section-header.visible { opacity: 1; transform: translateY(0); }

    .section-title {
      font-size: 24px; font-weight: 700;
      color: var(--text-main);
      position: relative;
      padding-left: 15px;
    }
    .section-title::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 4px; height: 24px;
      background: var(--primary-color);
      border-radius: 2px;
    }
    .section-icon { font-size: 24px; color: var(--accent-color); }

    /* ===== Scrollable Section ===== */
    .scroll-section {
      overflow-x: auto; 
      white-space: nowrap; 
      padding: 10px 5% 30px 5%; 
      scroll-behavior: smooth;
      display: flex;
      gap: 20px;
    }
    .scroll-section::-webkit-scrollbar { height: 0; width: 0; } /* Hide scrollbar for clean look */

    /* ===== Cards ===== */
    .card-link {
      display: inline-block; 
      text-decoration: none; 
      color: inherit; 
      position: relative;
      border-radius: var(--card-radius);
      transition: transform 0.3s ease;
      /* Initial state for scroll animation */
      opacity: 0;
      transform: translateY(30px);
    }
    
    .card {
      width: 220px; 
      height: 195px; 
      border-radius: var(--card-radius);
      background-color: var(--surface-color);
      overflow: hidden; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: var(--transition);
      position: relative;
      display: flex; flex-direction: column;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card-img-wrapper {
      width: 100%;
      height: 75%;
      overflow: hidden;
      position: relative;
    }

    .card img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transition: transform 0.5s ease;
    }

    .card-content {
      height: 25%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      background: var(--surface-color);
      z-index: 2;
    }

    .card span {
      font-size: 14px; font-weight: 600; color: var(--text-main);
      text-align: center;
      white-space: normal; /* Allow text wrapping */
      line-height: 1.2;
    }

    /* Tags */
    .live-tag {
      position: absolute; top: 12px; left: 12px; 
      background: rgba(239, 68, 68, 0.9);
      backdrop-filter: blur(4px);
      color: white; padding: 4px 8px;
      font-size: 10px; font-weight: 800; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.5px;
      z-index: 5;
      box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
      animation: pulse-red 2s infinite;
    }
    
    .channel-tag {
      position: absolute; top: 12px; right: 12px; 
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      color: white; padding: 4px 8px;
      font-size: 10px; border-radius: 4px;
      z-index: 5;
    }

    /* Hover Effects */
    .card-link:hover { transform: translateY(-5px); }
    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 15px 30px rgba(0,0,0,0.3), 0 0 15px rgba(59, 130, 246, 0.2);
      border-color: rgba(59, 130, 246, 0.3);
    }
    .card:hover img { transform: scale(1.15); filter: brightness(1.1); }

    /* Play Button Overlay */
    .play-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s;
      z-index: 4;
    }
    .card:hover .play-overlay { opacity: 1; }
    .play-overlay i { font-size: 50px; color: #fff; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); transform: scale(0.8); transition: transform 0.3s; }
    .card:hover .play-overlay i { transform: scale(1); }

    /* ===== Animations ===== */
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      nav { padding: 0 15px; height: 60px; }
      nav .logo a { font-size: 22px; }
      .hero-section { width: 100%; border-radius: 0; border-left: none; border-right: none; }
      iframe { height: 200px; }
      .card { width: 160px; height: 200px; }
      .search-container.active input { width: 150px; }
      .section-title { font-size: 20px; }
    }
    @media (max-width: 480px) {
      .card { width: 140px; height: 180px; }
      .card span { font-size: 12px; }
      .search-container.active input { width: 120px; }
    }
  </style>
</head>

  <script>
    /* ===== Theme Management (Dark/Light) ===== */
    const modeToggle = document.getElementById("modeToggle");
    const modeIcon = document.getElementById("modeIcon");
    const body = document.body;

    // Check Local Storage on Load
    const savedMode = localStorage.getItem("mode");
    if (savedMode === "light-mode") {
      body.classList.remove("dark");
      body.classList.add("light");
      modeIcon.classList.replace("bx-moon", "bx-sun");
    }

    modeToggle.addEventListener("click", () => {
      body.classList.toggle("dark");
      body.classList.toggle("light");
      
      const isDark = body.classList.contains("dark");
      
      // Toggle Icon
      if (isDark) {
        modeIcon.classList.replace("bx-sun", "bx-moon");
        localStorage.setItem("mode", "dark-mode");
      } else {
        modeIcon.classList.replace("bx-moon", "bx-sun");
        localStorage.setItem("mode", "light-mode");
      }
    });

    /* ===== Search Functionality ===== */
    const searchContainer = document.getElementById('searchContainer');
    const searchIcon = document.getElementById('searchIcon');
    const searchInput = document.getElementById('searchInput');

    // Toggle Search Bar
    searchIcon.addEventListener('click', () => {
      const isActive = searchContainer.classList.toggle("active");
      
      if (isActive) {
        searchIcon.classList.replace("uil-search", "uil-times");
        searchInput.focus();
      } else {
        searchIcon.classList.replace("uil-times", "uil-search");
        searchInput.value = "";
        resetCards();
      }
    });

    // Filter Logic
    searchInput.addEventListener('input', function() {
      const filter = this.value.toLowerCase().trim();
      const cards = document.querySelectorAll('.card-link');
      
      cards.forEach(link => {
        const title = link.querySelector('.card').getAttribute('data-title').toLowerCase();
        if (title.includes(filter)) {
          link.style.display = "inline-block";
          // Small animation to show result found
          link.style.animation = "fadeInDown 0.5s ease";
        } else {
          link.style.display = "none";
        }
      });
    });

    function resetCards() {
      const cards = document.querySelectorAll('.card-link');
      cards.forEach(link => {
        link.style.display = "inline-block";
        link.style.animation = "none";
      });
    }

    /* ===== Scroll To Top ===== */
    const upBtn = document.getElementById("scrollToTopBtn");
    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) {
        upBtn.style.display = "flex";
        // Small animation when appearing
        upBtn.style.animation = "fadeInDown 0.3s ease";
      } else {
        upBtn.style.display = "none";
      }
    });
    upBtn.addEventListener("click", () => window.scrollTo({top:0, behavior:'smooth'}));

    /* ===== Intersection Observer for Scroll Animations ===== */
    const observerOptions = {
      threshold: 0.1,
      rootMargin: "0px 0px -50px 0px"
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, index) => {
        if (entry.isIntersecting) {
          // Staggered delay based on index of sibling
          const delay = index % 5 * 100; 
          entry.target.style.animation = `fadeUp 0.6s ease forwards ${delay}ms`;
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    // Observe Headers
    document.querySelectorAll('.section-header').forEach(el => observer.observe(el));
    
    // Observe Cards
    document.querySelectorAll('.card-link').forEach(el => {
      el.style.opacity = "0"; // Ensure hidden before animation
      observer.observe(el);
    });

  </script>
