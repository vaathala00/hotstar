<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>JioTv+ Player</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(148, 163, 184, 0.1);
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gradient-start: #1e293b;
            --gradient-end: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 1.5rem 1rem;
            color: var(--text-main);
        }

        .app {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #38bdf8, #3b82f6);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .logo-text h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: auto;
        }

        .bookmark-header-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            backdrop-filter: blur(10px);
        }
        
        .bookmark-header-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            transform: translateY(-2px);
        }
        
        .bookmark-header-btn.active {
            background: var(--accent-color);
            color: #0f172a;
            border-color: var(--accent-color);
        }
        
        .bookmark-count {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            border: 2px solid var(--bg-color);
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 0.5rem 1rem;
            border: 1px solid var(--card-border);
            width: min(320px, 100%);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .search-wrapper:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
            background: rgba(30, 41, 59, 0.9);
        }
        
        .search-wrapper i {
            color: var(--text-muted);
            margin-right: 10px;
        }
        
        .search-wrapper input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            color: white;
            font-size: 0.95rem;
        }

        /* Categories */
        .category-shell {
            margin-bottom: 2rem;
        }

        .cats-inner {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 1rem;
        }

        .cat-chip {
            background: rgba(255,255,255,0.03);
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        
        .cat-chip:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }
        
        .cat-chip.active {
            background: var(--accent-color);
            color: #0f172a;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.25);
        }

        .toggle-cat-btn {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            width: auto;
            margin-top: 0.5rem;
        }
        
        .toggle-cat-btn:hover {
            border-color: var(--text-muted);
            color: #fff;
        }

        /* Grid */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.2rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .channel-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1rem 0.5rem 1rem;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            animation: fadeIn 0.5s ease forwards;
        }
        
        .channel-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.4);
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .card-logo {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .card-logo img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            object-fit: contain;
        }

        .card-name {
            font-weight: 600;
            font-size: 0.85rem;
            text-align: center;
            color: var(--text-main);
            padding: 0 4px;
            word-break: break-word;
            line-height: 1.3;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .hd-badge {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 6px;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .cat-tag {
            background: rgba(255,255,255,0.1);
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 6px;
            color: var(--text-muted);
        }

        .bookmark-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(15, 23, 42, 0.8);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
            z-index: 2;
            backdrop-filter: blur(4px);
        }
        
        .bookmark-btn:hover {
            background: #fff;
            color: #ef4444;
            transform: scale(1.1);
        }
        
        .bookmark-btn.active {
            color: #ef4444;
            background: rgba(255,255,255,0.1);
            border-color: #ef4444;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-card {
            background: #1e293b;
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .modal-overlay.show .modal-card {
            transform: scale(1);
        }
        
        .modal-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .modal-sub {
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        
        .play-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem;
            background: var(--accent-color);
            color: #0f172a;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }
        
        .close-modal {
            margin-top: 1.5rem;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: underline;
        }
        
        .close-modal:hover { color: #fff; }

        .empty-box {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: stretch; gap: 1rem; }
            .header-actions { justify-content: space-between; margin-left: 0; }
            .search-wrapper { width: 100%; }
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .card-logo { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

<div class="app">
    
    <header class="header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-tv"></i></div>
            <div class="logo-text">
                <h1>JioTV+</h1>
            </div>
        </div>
        <div class="header-actions">
            <div class="bookmark-header-btn" id="bookmarkHeaderBtn">
                <i class="fas fa-bookmark"></i>
                <span class="bookmark-count" id="bookmarkCount">0</span>
            </div>
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search channels...">
            </div>
        </div>
    </header>
    
    <div class="category-shell">
        <div class="cats-inner" id="catInner"></div>
        <button class="toggle-cat-btn" id="toggleCatsBtn">
            <span id="toggleBtnText">Show More</span>
        </button>
    </div>
    
    <div id="channelGrid" class="channel-grid"></div>
    
    <!-- Modal target="_blank" -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="modal-title" id="modalChannelName">Channel</div>
            <div class="modal-sub" id="modalGroupId">Group</div>
            

            <a href="#" class="play-btn" id="playLink" >
                <i class="fas fa-play"></i> Watch Now
            </a>
            
            <button class="close-modal" id="closeModalBtn">Cancel</button>
        </div>
    </div>

</div>

<script>
    (function(){
        // State
        let allChannels = [];
        let filtered = [];
        let bookmarks = JSON.parse(localStorage.getItem('allinone_bookmarks_final')) || [];
        let categories = ['All'];
        let activeCategory = 'All';
        let categoriesExpanded = false;
        let showingBookmarksOnly = false;

        // DOM Elements
        const grid = document.getElementById('channelGrid');
        const catInner = document.getElementById('catInner');
        const searchInput = document.getElementById('searchInput');
        const toggleBtn = document.getElementById('toggleCatsBtn');
        const toggleBtnText = document.getElementById('toggleBtnText');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalChannelName = document.getElementById('modalChannelName');
        const modalGroupId = document.getElementById('modalGroupId');
        const playLink = document.getElementById('playLink');
        const closeModal = document.getElementById('closeModalBtn');
        const bookmarkHeaderBtn = document.getElementById('bookmarkHeaderBtn');
        const bookmarkCount = document.getElementById('bookmarkCount');

        // Fetch Data
        async function loadJSON() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/vaathala00/jow/main/output.json');
                const data = await res.json();
                allChannels = data;
                extractCategories();
                updateBookmarkCount();
                filterAndRender();
            } catch (e) {
                grid.innerHTML = `<div class="empty-box"><i class="fas fa-exclamation-circle" style="font-size:2rem;margin-bottom:10px;"></i><br>Could not load channels. Please check your connection.</div>`;
            }
        }

        function extractCategories() {
            const catSet = new Set();
            allChannels.forEach(ch => { 
                if (ch.group && ch.group.trim()) catSet.add(ch.group.trim()); 
            });
            categories = ['All', ...Array.from(catSet).sort()];
            renderCategories();
        }

        function renderCategories() {
            const limit = categoriesExpanded ? categories.length : 6; // Show first 6 by default
            const visibleCats = categories.slice(0, limit);
            
            let html = visibleCats.map(cat => 
                `<span class="cat-chip ${activeCategory === cat ? 'active' : ''}" data-cat="${cat}">${cat}</span>`
            ).join('');
            
            if (categories.length > 6 && !categoriesExpanded) {
                html += `<span class="cat-chip">+${categories.length - 6} more</span>`;
            }

            catInner.innerHTML = html;
            
            // Bind clicks
            document.querySelectorAll('.cat-chip[data-cat]').forEach(chip => {
                chip.addEventListener('click', (e) => {
                    activeCategory = e.target.dataset.cat;
                    showingBookmarksOnly = false;
                    bookmarkHeaderBtn.classList.remove('active');
                    renderCategories();
                    filterAndRender();
                });
            });

            toggleBtn.style.display = categories.length > 6 ? 'inline-block' : 'none';
            toggleBtnText.innerText = categoriesExpanded ? 'Show Less' : 'Show More';
        }

        toggleBtn.addEventListener('click', () => {
            categoriesExpanded = !categoriesExpanded;
            renderCategories();
        });

        function filterAndRender() {
            const query = searchInput.value.trim().toLowerCase();
            let temp = [...allChannels];

            if (showingBookmarksOnly) {
                temp = temp.filter(ch => bookmarks.includes(String(ch.id)));
            } else if (activeCategory !== 'All') {
                temp = temp.filter(ch => ch.group === activeCategory);
            }
            
            if (query) {
                temp = temp.filter(ch => ch.name?.toLowerCase().includes(query));
            }

            filtered = temp;
            renderGrid(filtered);
        }

        function renderGrid(channels) {
            if (channels.length === 0) {
                grid.innerHTML = `<div class="empty-box">No channels found.</div>`;
                return;
            }

            const html = channels.map(ch => {
                const isBookmarked = bookmarks.includes(String(ch.id));
                const isHD = ch.name && (ch.name.includes('HD') || ch.name.includes('FHD'));
                
                return `
                <div class="channel-card" data-id="${ch.id}" data-name="${ch.name}" data-link="${ch.link}" data-group="${ch.group || ''}">
                    <div class="bookmark-btn ${isBookmarked ? 'active' : ''}" onclick="event.stopPropagation(); toggleBookmark('${ch.id}', this)">
                        <i class="fas fa-bookmark"></i>
                    </div>
                    <div class="card-logo">
                        <img src="${ch.logo || 'https://via.placeholder.com/150'}" alt="${ch.name}" loading="lazy">
                    </div>
                    <div class="card-name">${ch.name}</div>
                    <div class="card-badges">
                        ${isHD ? '<span class="hd-badge">HD</span>' : ''}
                        <span class="cat-tag">${(ch.group || '').slice(0, 8)}</span>
                    </div>
                </div>
                `;
            }).join('');

            grid.innerHTML = html;

            // Card Click Listener
            document.querySelectorAll('.channel-card').forEach(card => {
                card.addEventListener('click', () => {
                    const link = card.dataset.link;
                    const name = card.dataset.name;
                    const group = card.dataset.group;
                    if (link) openModal(name, group, link);
                });
            });
        }

        // Global function for bookmark button inside onclick
        window.toggleBookmark = function(id, btnElement) {
            const index = bookmarks.indexOf(String(id));
            if (index === -1) {
                bookmarks.push(String(id));
                btnElement.classList.add('active');
            } else {
                bookmarks.splice(index, 1);
                btnElement.classList.remove('active');
            }
            localStorage.setItem('allinone_bookmarks_final', JSON.stringify(bookmarks));
            updateBookmarkCount();
            
            if (showingBookmarksOnly) filterAndRender();
        };

        function updateBookmarkCount() {
            bookmarkCount.textContent = bookmarks.length;
            bookmarkCount.style.display = bookmarks.length > 0 ? 'flex' : 'none';
        }

        bookmarkHeaderBtn.addEventListener('click', () => {
            if (bookmarks.length === 0) {
                alert("You haven't bookmarked any channels yet.");
                return;
            }
            showingBookmarksOnly = !showingBookmarksOnly;
            bookmarkHeaderBtn.classList.toggle('active', showingBookmarksOnly);
            if(showingBookmarksOnly) {
                activeCategory = 'All'; // Reset category when viewing bookmarks
                renderCategories(); // Update UI to show no active category
            }
            filterAndRender();
        });

        // Modal Logic
        function openModal(name, group, link) {
            modalChannelName.textContent = name;
            modalGroupId.textContent = group;
            playLink.href = link;
            modalOverlay.classList.add('show');
        }

        closeModal.addEventListener('click', () => modalOverlay.classList.remove('show'));
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) modalOverlay.classList.remove('show');
        });

        // Search Debounce
        let searchTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(filterAndRender, 300);
        });

        // Init
        loadJSON();

    })();
</script>

</body>
</html>
